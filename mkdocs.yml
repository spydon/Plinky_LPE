site_name: Plinky LPE Docs
site_url: https://ember-labs-io.github.io/
repo_url: https://github.com/ember-labs-io/Plinky_LPE
repo_name: ember-labs-io/Plinky_LPE

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: deep purple
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Manual: manual.md
  - Build Guide: build-guide.md
  - Parameters: parameters.md
  - MIDI CC Map: midi-cc.md

exclude_docs: |
  includes/

not_in_nav: |
  icon-reference.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.snippets:
      base_path: docs
      auto_append:
        - includes/icons.md
