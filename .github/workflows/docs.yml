name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Copy image assets into docs
        run: |
          mkdir -p docs/imgs
          cp -r imgs/. docs/imgs/

      - name: Build docs
        run: mkdocs build

      - name: Deploy to ember-labs-io.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: ember-labs-io/ember-labs-io.github.io
          publish_branch: main
          publish_dir: ./site
